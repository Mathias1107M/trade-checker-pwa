<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f9d55">
  <meta name="description" content="交易前檢查工具，確認情緒、策略與風險管理是否符合原則。">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect width='128' height='128' rx='24' fill='%231f9d55'/%3E%3Cpath d='M31 65l18 18 48-48' fill='none' stroke='white' stroke-width='12' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='34' fill='%231f9d55'/%3E%3Cpath d='M44 93l24 24 68-68' fill='none' stroke='white' stroke-width='16' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <title>交易檢查工具</title>
</head>
<body>
  <main class="app-shell">
    <section class="card" id="app" aria-live="polite">
      <header class="header">
        <p class="eyebrow">Trade Checklist</p>
        <h1>交易檢查工具</h1>
        <p class="subtitle">逐題回答。全部符合才允許交易。</p>
      </header>

      <div id="content"></div>

      <footer class="footer">
        <p id="progressText" class="progress-text">Progress: 0 / 16</p>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
